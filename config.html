<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Manager — Configuração</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 24px; color: #1a1a1a; background: #fff; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #0066b3; }
    p { font-size: 13px; color: #666; margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; font-family: inherit; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #0066b3; }
    button { padding: 9px 24px; background: #0066b3; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    button:hover { background: #004d87; }
  </style>
</head>
<body>
  <h2>Meeting Manager</h2>
  <p>Configure esta aba para sua equipe. O nome da reunião será exibido no cabeçalho do app.</p>
  <label>Nome da reunião (padrão)</label>
  <input id="meeting-name" type="text" placeholder="Ex: Standup Diário" value="Reunião de Equipe">
  <br>
  <button onclick="save()">Salvar configuração</button>

  <script>
    microsoftTeams.app.initialize().then(() => {
      microsoftTeams.pages.config.registerOnSaveHandler(saveHandler);
      microsoftTeams.pages.config.setValidityState(true);
    });

    function saveHandler(saveEvent) {
      const name = document.getElementById('meeting-name').value.trim() || 'Reunião de Equipe';
      microsoftTeams.pages.config.setConfig({
        entityId: 'meetingManager',
        contentUrl: `https://SEU-DOMINIO.com/meeting-manager/index.html?meeting=${encodeURIComponent(name)}`,
        suggestedDisplayName: 'Meeting Manager',
        websiteUrl: 'https://SEU-DOMINIO.com/meeting-manager/index.html'
      });
      saveEvent.notifySuccess();
    }

    function save() {
      microsoftTeams.pages.config.setValidityState(true);
    }
  </script>
</body>
</html>
